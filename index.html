<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Image Converter PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
*{box-sizing:border-box;font-family:'Prompt',sans-serif;}
body{margin:0;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;}
.container{max-width:1100px;margin:auto;padding:20px;}
.header{text-align:center;margin-bottom:25px;}
.header h1{margin:0;font-size:28px;}
.header p{opacity:0.7;}

.upload-box{
    border:2px dashed #38bdf8;
    padding:30px;
    text-align:center;
    border-radius:16px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.3s;
}
.upload-box:hover{background:rgba(255,255,255,0.08);}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#38bdf8,#6366f1);
    color:#fff;
    font-weight:500;
    cursor:pointer;
}
button:disabled{
    background:#555;
    cursor:not-allowed;
}

.status{margin-top:15px;text-align:center;}

.progress{
    width:100%;
    height:10px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}
.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#4ade80);
}

/* 👇 gallery ปรับให้เรียงลง */
.gallery{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:25px;
}

/* 👇 wrapper ของแต่ละหน้า */
.page-item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* 👇 เลขหน้า */
.page-number{
    font-size:12px;
    opacity:0.7;
    margin-bottom:8px;
}

/* 👇 รูป */
.gallery img{
    width:100%;
    border-radius:12px;
    box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

/* desktop */
@media(min-width:768px){
    .gallery img{width:90%;}
}
@media(min-width:1200px){
    .gallery img{width:70%;}
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <h1>📄 PDF → Image Converter</h1>
    <p>แปลงไฟล์ PDF เป็นรูปภาพ พร้อมดูตัวอย่างทุกหน้า</p>
</div>

<div class="upload-box" id="dropZone">
    <p>📂 คลิกหรือวางไฟล์ PDF ที่นี่</p>
    <input type="file" id="pdfInput" accept="application/pdf" hidden>
</div>

<center>
    <button id="convertBtn" disabled>🚀 แปลง</button>
    <button id="downloadBtn" disabled>📦 ดาวน์โหลด ZIP</button>
</center>

<div class="status" id="status"></div>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="gallery" id="gallery"></div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

const input = document.getElementById('pdfInput');
const dropZone = document.getElementById('dropZone');
const convertBtn = document.getElementById('convertBtn');
const downloadBtn = document.getElementById('downloadBtn');

let zip = new JSZip();

dropZone.onclick = () => input.click();

dropZone.addEventListener('dragover', e=>{
    e.preventDefault();
    dropZone.style.background="rgba(255,255,255,0.1)";
});
dropZone.addEventListener('dragleave', ()=>{
    dropZone.style.background="rgba(255,255,255,0.05)";
});
dropZone.addEventListener('drop', e=>{
    e.preventDefault();
    input.files = e.dataTransfer.files;
    handleFileSelect();
});

input.addEventListener('change', handleFileSelect);

function handleFileSelect(){
    if(input.files.length > 0){
        document.getElementById('status').innerText =
        '✅ โหลดไฟล์สำเร็จแล้ว กดแปลงได้เลย';
        convertBtn.disabled = false;
        downloadBtn.disabled = true;
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('gallery').innerHTML = '';
    }
}

convertBtn.addEventListener('click', async ()=>{
    if(input.files.length === 0) return;

    const file = input.files[0];
    const reader = new FileReader();

    zip = new JSZip();
    document.getElementById('status').innerText = 'กำลังโหลด PDF...';

    reader.onload = async function(){
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

        for(let i=1;i<=pdf.numPages;i++){
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({scale:2.5});

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({canvasContext:ctx,viewport}).promise;

            const imgURL = canvas.toDataURL('image/png');

            // 👇 wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'page-item';

            // 👇 เลขหน้า
            const pageLabel = document.createElement('div');
            pageLabel.className = 'page-number';
            pageLabel.innerText = 'หน้า ' + i;

            // 👇 รูป
            const img = document.createElement('img');
            img.src = imgURL;

            wrapper.appendChild(pageLabel);
            wrapper.appendChild(img);

            document.getElementById('gallery').appendChild(wrapper);

            // zip
            zip.file(`page_${i}.png`, imgURL.split(',')[1], {base64:true});

            let percent = (i/pdf.numPages)*100;
            document.getElementById('progressBar').style.width = percent+'%';
            document.getElementById('status').innerText =
            `กำลังแปลง ${i}/${pdf.numPages}`;
        }

        document.getElementById('status').innerText =
        '✅ แปลงเสร็จแล้ว กดดาวน์โหลดได้เลย';

        downloadBtn.disabled = false;
    };

    reader.readAsArrayBuffer(file);
});

downloadBtn.addEventListener('click', async ()=>{
    document.getElementById('status').innerText = 'กำลังสร้าง ZIP...';

    const content = await zip.generateAsync({type:"blob"});
    saveAs(content,"pdf_images.zip");

    document.getElementById('status').innerText = '🎉 ดาวน์โหลดสำเร็จ!';
});
</script>

</body>
</html>
